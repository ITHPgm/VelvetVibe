<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Velvet Vibe | Join the Elite</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #f0eef7;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 20px;
    }

    /* Animated gradient background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255, 59, 111, 0.15), transparent 70%),
                  radial-gradient(circle at 80% 70%, rgba(255, 138, 92, 0.1), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .register-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
    }

    /* Card styling */
    .register-card {
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 40px 36px;
      border: 1px solid rgba(255, 59, 111, 0.35);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 59, 111, 0.1) inset;
      transition: transform 0.3s ease;
    }

    /* Logo & brand */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3b6f, #ff9a5f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .logo i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #ff3b6f;
      font-size: 1.8rem;
    }
    .tagline {
      text-align: center;
      color: #b9b3e6;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* Form grid for 2 cols on larger screens */
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .form-row .input-group {
      flex: 1;
      margin-bottom: 0;
    }
    .input-group {
      margin-bottom: 22px;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #ddd9ff;
    }
    .input-group i.icon {
      position: absolute;
      left: 18px;
      bottom: 18px;
      color: #ff3b6f;
      font-size: 1.1rem;
      transition: 0.2s;
    }
    .input-group input, .input-group select {
      width: 100%;
      background: rgba(25, 25, 35, 0.9);
      border: 1px solid #2a2a36;
      border-radius: 60px;
      padding: 16px 20px 16px 48px;
      font-size: 1rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }
    .input-group select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23ff3b6f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 20px center;
      padding-right: 50px;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #ff3b6f;
      box-shadow: 0 0 0 3px rgba(255, 59, 111, 0.2);
      background: #1c1c26;
    }
    .input-group input::placeholder {
      color: #6a6590;
    }

    /* Terms & age checkbox */
    .terms-group {
      margin: 24px 0 20px;
    }
    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      color: #b9b3e6;
      font-size: 0.85rem;
    }
    .checkbox-label input {
      margin-top: 3px;
      accent-color: #ff3b6f;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .checkbox-label a {
      color: #ff8a5c;
      text-decoration: none;
    }
    .checkbox-label a:hover {
      text-decoration: underline;
    }

    /* button */
    .btn-register {
      width: 100%;
      background: linear-gradient(95deg, #ff3b6f, #ff8a5c);
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0a0a0f;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(255, 59, 111, 0.3);
      margin-bottom: 24px;
    }
    .btn-register:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 28px rgba(255, 59, 111, 0.5);
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: #8e89b0;
      font-size: 0.8rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #2a2a36;
    }
    .divider::before {
      margin-right: 1em;
    }
    .divider::after {
      margin-left: 1em;
    }

    /* social login (optional) */
    .social-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .social-btn {
      flex: 1;
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid #3a3a4a;
      border-radius: 50px;
      padding: 12px 0;
      text-align: center;
      color: #ddd9ff;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .social-btn i {
      margin-right: 8px;
      font-size: 1.1rem;
    }
    .social-btn:hover {
      background: #ff3b6f20;
      border-color: #ff3b6f;
      color: #ff9a7a;
    }

    /* sign in link */
    .signin-link {
      text-align: center;
      font-size: 0.9rem;
      color: #b9b3e6;
    }
    .signin-link a {
      color: #ff3b6f;
      text-decoration: none;
      font-weight: 600;
    }
    .signin-link a:hover {
      text-decoration: underline;
    }

    /* disclaimer */
    .disclaimer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.7rem;
      color: #6a6590;
      border-top: 1px solid #1e1e2a;
      padding-top: 20px;
    }
    .disclaimer i {
      margin-right: 4px;
      color: #ff6f5e;
    }

    /* error/success message */
    .message-box {
      background: rgba(255, 59, 111, 0.2);
      border-left: 4px solid #ff3b6f;
      padding: 12px 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .message-box.success {
      background: rgba(76, 175, 80, 0.2);
      border-left-color: #4caf50;
      color: #b9f6ca;
    }
    .message-box.show {
      display: flex;
    }

    /* responsive */
    @media (max-width: 550px) {
      .register-card {
        padding: 30px 24px;
      }
      .form-row {
        flex-direction: column;
        gap: 0;
      }
      .form-row .input-group {
        margin-bottom: 22px;
      }
      .social-btn span {
        display: none;
      }
      .social-btn i {
        margin-right: 0;
        font-size: 1.4rem;
      }
      .social-btn {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="register-wrapper">
    <div class="register-card" data-aos="fade-up" data-aos-duration="1000" data-aos-easing="ease-out-cubic">
      <div class="logo-area" data-aos="zoom-in" data-aos-delay="150">
        <div class="logo">
          <i class="fas fa-crown"></i> VELVET VIBE
        </div>
        <div class="tagline">Create your exclusive account</div>
      </div>

      <!-- Dynamic message box -->
      <div id="messageBox" class="message-box" data-aos="fade-down" data-aos-delay="200">
        <i class="fas fa-info-circle"></i> <span id="messageText"></span>
      </div>

      <form id="registerForm">
        <div class="form-row">
          <div class="input-group" data-aos="fade-right" data-aos-delay="250">
            <label for="firstname">First Name</label>
            <i class="icon fas fa-user"></i>
            <input type="text" id="firstname" placeholder="John" required>
          </div>
          <div class="input-group" data-aos="fade-left" data-aos-delay="300">
            <label for="lastname">Last Name</label>
            <i class="icon fas fa-user"></i>
            <input type="text" id="lastname" placeholder="Doe" required>
          </div>
        </div>

        <div class="input-group" data-aos="fade-right" data-aos-delay="350">
          <label for="email">Email Address</label>
          <i class="icon fas fa-envelope"></i>
          <input type="email" id="email" placeholder="hello@velvet.com" required>
        </div>

        <div class="input-group" data-aos="fade-right" data-aos-delay="400">
          <label for="username">Username</label>
          <i class="icon fas fa-at"></i>
          <input type="text" id="username" placeholder="velvet_fan" required>
        </div>

        <div class="form-row">
          <div class="input-group" data-aos="fade-right" data-aos-delay="450">
            <label for="password">Password</label>
            <i class="icon fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <div class="input-group" data-aos="fade-left" data-aos-delay="500">
            <label for="confirm">Confirm Password</label>
            <i class="icon fas fa-check-circle"></i>
            <input type="password" id="confirm" placeholder="••••••••" required>
          </div>
        </div>

        <div class="input-group" data-aos="fade-up" data-aos-delay="550">
          <label for="birthdate">Date of Birth (18+ only)</label>
          <i class="icon fas fa-calendar-alt"></i>
          <input type="date" id="birthdate" required>
        </div>

        <div class="terms-group" data-aos="fade-up" data-aos-delay="600">
          <label class="checkbox-label">
            <input type="checkbox" id="ageConfirm" required>
            <span>I confirm that I am <strong>18 years or older</strong> and agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
          </label>
        </div>

        <div class="terms-group" data-aos="fade-up" data-aos-delay="650">
          <label class="checkbox-label">
            <input type="checkbox" id="newsletter">
            <span>I want to receive exclusive offers, updates, and member-only content (optional).</span>
          </label>
        </div>

        <button type="submit" class="btn-register" data-aos="zoom-in" data-aos-delay="700">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="divider" data-aos="fade-up" data-aos-delay="750">or sign up with</div>

      <div class="social-buttons" data-aos="fade-up" data-aos-delay="800">
        <div class="social-btn" id="googleReg">
          <i class="fab fa-google"></i> <span>Google</span>
        </div>
        <div class="social-btn" id="appleReg">
          <i class="fab fa-apple"></i> <span>Apple</span>
        </div>
        <div class="social-btn" id="twitterReg">
          <i class="fab fa-twitter"></i> <span>Twitter</span>
        </div>
      </div>

      <div class="signin-link" data-aos="fade-up" data-aos-delay="850">
        Already have an account? <a href="/../../auth/login/">Sign in →</a>
      </div>

      <div class="disclaimer" data-aos="fade-up" data-aos-delay="900">
        <i class="fas fa-exclamation-triangle"></i> By joining, you verify that you are at least 18 years old. All models are over 21. This site uses cookies.
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      once: true,
      offset: 30,
      duration: 800,
      easing: 'ease-out-cubic',
      mirror: false
    });

    // DOM elements
    const registerForm = document.getElementById('registerForm');
    const messageBox = document.getElementById('messageBox');
    const messageText = document.getElementById('messageText');

    function showMessage(msg, isError = true) {
      messageText.innerText = msg;
      messageBox.classList.add('show');
      if (!isError) {
        messageBox.classList.add('success');
      } else {
        messageBox.classList.remove('success');
      }
      setTimeout(() => {
        messageBox.classList.remove('show');
      }, 4000);
    }

    registerForm.addEventListener('submit', function(e) {
      e.preventDefault();

      // Get values
      const firstName = document.getElementById('firstname').value.trim();
      const lastName = document.getElementById('lastname').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const birthdate = document.getElementById('birthdate').value;
      const ageConfirmed = document.getElementById('ageConfirm').checked;

      // Validation
      if (!firstName || !lastName || !email || !username || !password || !confirm || !birthdate) {
        showMessage('Please fill in all required fields.');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters long.');
        return;
      }

      if (password !== confirm) {
        showMessage('Passwords do not match.');
        return;
      }

      if (!ageConfirmed) {
        showMessage('You must confirm that you are 18+ and agree to the terms.');
        return;
      }

      // Age verification (simple: check if age >= 18)
      const today = new Date();
      const birth = new Date(birthdate);
      let age = today.getFullYear() - birth.getFullYear();
      const monthDiff = today.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
        age--;
      }
      if (age < 18) {
        showMessage('You must be at least 18 years old to register.');
        return;
      }

      // Email format check
      const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      if (!emailPattern.test(email)) {
        showMessage('Please enter a valid email address.');
        return;
      }

      // Simulate successful registration
      showMessage('Account created successfully! Redirecting...', false);
      setTimeout(() => {
        alert('Welcome to Velvet Vibe! You can now log in.');
        // In a real scenario: window.location.href = "login.html";
        registerForm.reset();
        messageBox.classList.remove('show');
      }, 1500);
    });

    // Social registration dummy handlers
    document.getElementById('googleReg').addEventListener('click', () => alert('Google sign-up demo – would redirect to OAuth.'));
    document.getElementById('appleReg').addEventListener('click', () => alert('Apple sign-up demo – coming soon.'));
    document.getElementById('twitterReg').addEventListener('click', () => alert('Twitter/X sign-up demo – integrate with OAuth.'));
  </script>
</body>
</html>
